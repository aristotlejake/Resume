<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{site.title}}</title>
    <meta name="description" content="{{site.description}}">
    <meta name="author" content="{{site.name}}">
    <meta name="theme-color" content="#2f4a57" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1b2a33" media="(prefers-color-scheme: dark)">

    <meta property="og:type" content="profile">
    <meta property="og:title" content="{{site.title}}">
    <meta property="og:description" content="{{site.description}}">
    <meta property="og:url" content="{{site.url}}">
    <meta property="og:image" content="{{site.url}}/assets/images/{{site.og_image}}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{site.title}}">
    <meta name="twitter:description" content="{{site.description}}">
    <meta name="twitter:image" content="{{site.url}}/assets/images/{{site.og_image}}">

    <link rel="icon" type="image/svg+xml" href="{{site.baseurl}}/favicon.svg">
    <link rel="alternate icon" href="{{site.baseurl}}/favicon.ico">
    <link rel="canonical" href="{{site.url}}">

    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/{% if site.style %}{{ site.style}}.css{% else %}styles.css{% endif %}">
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/custom.css">

    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "{{site.name}}",
      "jobTitle": "{{site.tagline}}",
      "description": "{{site.description}}",
      "url": "{{site.url}}",
      "image": "{{site.url}}/assets/images/{{site.pic}}",
      "email": "mailto:{{site.email}}",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "{{site.location}}"
      },
      "sameAs": [
        "https://www.linkedin.com/in/{{site.linkedin}}",
        "https://github.com/{{site.github}}",
        "https://{{site.website}}"
      ],
      "worksFor": {
        "@type": "Organization",
        "name": "Zonos"
      },
      "alumniOf": [
        {"@type": "CollegeOrUniversity", "name": "Southern Utah University"},
        {"@type": "CollegeOrUniversity", "name": "Utah Tech University"}
      ],
      "hasCredential": [
        {"@type": "EducationalOccupationalCredential", "name": "CISSP", "credentialCategory": "certification"},
        {"@type": "EducationalOccupationalCredential", "name": "M.S. Cybersecurity with Information Assurance", "credentialCategory": "degree"}
      ]
    }
    </script>
</head>
