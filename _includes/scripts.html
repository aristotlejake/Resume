<script>
  (function () {
    try {
      console.log(
        '%c👋 caught you snooping. that\'s the right instinct.%c\n\nsecurity.txt: /.well-known/security.txt\nfound something interesting? mail@jakearmstrong.me',
        'color:#4fb3bf;font-size:16px;font-weight:bold;line-height:1.6;',
        'color:#888;font-size:12px;line-height:1.5;'
      );
    } catch (e) {}

    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
    });
    document.querySelectorAll('a[href^="#"]').forEach(function (a) {
      a.addEventListener('click', function (e) {
        var id = a.getAttribute('href').slice(1);
        var el = id && document.getElementById(id);
        if (el) { e.preventDefault(); el.scrollIntoView({behavior: 'smooth', block: 'start'}); }
      });
    });
  })();
</script>
